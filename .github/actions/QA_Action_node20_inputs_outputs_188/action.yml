name: 'QA_Action_node20_inputs_outputs_188'
description: 'Node.js action with inputs and outputs'
inputs:
  message:
    description: 'Message to log'
    required: true
  level:
    description: 'Log level'
    required: false
    default: 'info'
outputs:
  logged:
    description: 'Whether message was logged'
  count:
    description: 'Number of messages'
runs:
  using: node20
  main: 'index.js'
